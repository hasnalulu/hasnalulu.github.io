<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/Dashbord.css">
</head>

<body>
    <header>
        <div class="name-label">
            <h2>Good Morning, Dr. Ashlynn 👋🏻</h2>
            <p>Your progress this week is Awesome</p>
        </div>
        <div class="search-box">
            <img src="images/icons/Search.svg" alt="search icon">
            <input class="search" placeholder="Search">
        </div>
        <div class="user-info">
            <a href="" class="notification"><img src="Images/icons/Bell.svg" alt="">
            </a>
            <a href=""> <img src="Images/icons/Message circle.svg" alt="">
            </a>
            <a href=""><img src="Images/icons/profile.png" alt=""></a>

        </div>
    </header>
    <div class="cards">
        <div class="stat-cards">

            <div class="stat-card">
                <div class="title-row">
                    <div class="label">
                        <img src="Images/icons/icon.svg" alt="">
                        <h3>Card Title</h3>
                    </div>
                    <a href="" class="more-icon">
                        <img src="Images/icons/more-icon.svg" alt="">
                    </a>
                </div>

                <div class="second-row">
                    <div>
                        <h2>102</h2>
                    </div>
                    <div class="badge"> <img src="Images/icons/status count.svg" alt="">
                        <p>12.8% the last month</p>
                    </div>

                </div>
                <div class="bottom-row">
                    <div class="new">
                        <p>New Patient</p>
                        <h3>48</h3>
                    </div>
                    <div class="old">
                        <p>Old Patient</p>
                        <h3>54</h3>
                    </div>
                </div>

            </div>

        </div>
        <div class="stat-cards">

            <div class="stat-card">
                <div class="title-row">
                    <div class="label">
                        <img src="Images/icons/H.svg" alt="">
                        <h3>Overall Room</h3>
                    </div>
                    <a href="" class="more-icon">
                        <img src="Images/icons/more-icon.svg" alt="">
                    </a>
                </div>

                <div class="second-row">
                    <div>
                        <h2>128</h2>
                    </div>
                    <div class="badge"> <img src="Images/icons/status count.svg" alt="">
                        <p>0.8% the last month</p>
                    </div>

                </div>
                <div class="bottom-row">
                    <div class="new">
                        <p>General Room</p>
                        <h3>98</h3>
                    </div>
                    <div class="old">
                        <p>Private Room</p>
                        <h3>30</h3>
                    </div>
                </div>

            </div>

        </div>
        <div class="stat-cards">

            <div class="stat-card">
                <div class="title-row">
                    <div class="label">
                        <img src="Images/icons/calendar-alt.svg" alt="">
                        <h3>Appointment</h3>
                    </div>
                    <a href="" class="more-icon">
                        <img src="Images/icons/more-icon.svg" alt="">
                    </a>
                </div>

                <div class="second-row">
                    <div>
                        <h2>254</h2>
                    </div>
                    <div class="badge"> <img src="Images/icons/status count.svg" alt="">
                        <p>1.9% the last month</p>
                    </div>

                </div>
                <div class="bottom-row">
                    <div class="new">
                        <p>New Patient</p>
                        <h3>56</h3>
                    </div>
                    <div class="old">
                        <p>Old Patient</p>
                        <h3>43</h3>
                    </div>
                </div>

            </div>

        </div>
    </div>
</body>

</html>
